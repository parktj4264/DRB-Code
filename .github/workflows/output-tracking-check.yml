name: Output Tracking Check

on:
  push:
  pull_request:

jobs:
  check-output-tracking:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Validate output tracking policy
        run: Rscript scripts/check_latest_output_tracking.R
